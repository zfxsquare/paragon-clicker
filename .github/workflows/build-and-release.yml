name: Build And Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Install project dependencies
        run: uv sync

      - name: Install UPX
        shell: pwsh
        run: |
          choco install upx -y
          upx --version

      - name: Build single-file executable
        run: >-
          uv run --with pyinstaller pyinstaller
          --noconfirm
          --clean
          --onefile
          --windowed
          --name paragon-clicker
          --paths src
          --exclude-module PySide6.QtCharts
          --exclude-module PySide6.QtDataVisualization
          --exclude-module PySide6.QtMultimedia
          --exclude-module PySide6.QtNetwork
          --exclude-module PySide6.QtOpenGL
          --exclude-module PySide6.QtPositioning
          --exclude-module PySide6.QtQml
          --exclude-module PySide6.QtQuick
          --exclude-module PySide6.QtQuickControls2
          --exclude-module PySide6.QtRemoteObjects
          --exclude-module PySide6.QtScxml
          --exclude-module PySide6.QtSensors
          --exclude-module PySide6.QtSql
          --exclude-module PySide6.QtStateMachine
          --exclude-module PySide6.QtTest
          --exclude-module PySide6.QtTextToSpeech
          --exclude-module PySide6.QtWebChannel
          --exclude-module PySide6.QtWebEngineCore
          --exclude-module PySide6.QtWebEngineQuick
          --exclude-module PySide6.QtWebEngineWidgets
          --exclude-module PySide6.QtWebSockets
          --exclude-module PySide6.QtXml
          --exclude-module PySide6.QtXmlPatterns
          --exclude-module pyautogui
          --exclude-module pyscreeze
          --exclude-module mouseinfo
          --exclude-module pygetwindow
          --exclude-module pymsgbox
          --exclude-module pytweening
          --exclude-module PIL
          --upx-dir C:\ProgramData\chocolatey\bin
          scripts/launch_paragon_clicker.py

      - name: Prepare release archive
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force release | Out-Null
          Copy-Item dist/paragon-clicker.exe release/paragon-clicker.exe
          Copy-Item README.md release/README.md
          Compress-Archive -Path release/* -DestinationPath dist/paragon-clicker-windows-x64.zip -Force

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: paragon-clicker-windows-x64
          path: dist/paragon-clicker-windows-x64.zip

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-windows
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download built artifact
        uses: actions/download-artifact@v4
        with:
          name: paragon-clicker-windows-x64
          path: dist

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/paragon-clicker-windows-x64.zip
